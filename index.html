<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Bio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a0a23, #1a0033);
  color: white;
  text-align: center;
}

/* Avatar */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 30px;
  border: 4px solid;
  border-image: linear-gradient(45deg, pink, cyan) 1;
}

/* Title */
h1 {
  margin: 10px 0;
}

/* Button card */
.card {
  width: 90%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 20px;
  background: #111;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 3px solid;
  border-image: linear-gradient(45deg, pink, cyan) 1;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* icon */
.card img {
  width: 50px;
  height: 50px;
  border-radius: 15px;
}

/* text */
.card span {
  color: #4da6ff;
  font-size: 16px;
}

/* copy box */
.share-box {
  width: 90%;
  margin: 30px auto;
  padding: 20px;
  border-radius: 20px;
  background: #222;
}

.copy-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: cyan;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* footer */
.footer {
  margin: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<img class="avatar" src="https://i.imgur.com/4ZQZ4Zp.png">

<h1>🍎 téo 🍎 SCRVN 🇻🇳</h1>
<p>chia sẻ đồ hướng dẫn làm script...</p>

<!-- CARD -->
<div class="card">
  <img src="https://i.imgur.com/4ZQZ4Zp.png">
  <span>😆 🍎 trang chia sẻ đồ free fire</span>
</div>

<div class="card">
  <img src="https://i.imgur.com/4ZQZ4Zp.png">
  <span>🍎 Tổng hợp tất cả client mới nhất</span>
</div>

<div class="card">
  <img src="https://i.imgur.com/4ZQZ4Zp.png">
  <span>🍎 liên hệ admin téo hoặc người bán tool</span>
</div>

<div class="card">
  <img src="https://i.imgur.com/4ZQZ4Zp.png">
  <span>🍎 hướng dẫn làm script P2</span>
</div>

<div class="card">
  <img src="https://i.imgur.com/4ZQZ4Zp.png">
  <span>🍎 script tổng hợp téo 🇻🇳</span>
</div>

<!-- SHARE -->
<div class="share-box">
  <h2>📤 Chia sẻ trang</h2>
  <p>Chia sẻ cho bạn bè để ủng hộ nhé</p>
  <button class="copy-btn" onclick="copyLink()">Copy link</button>
</div>

<div class="footer">
  © 2026 🍎 téo scrVN 🇻🇳
</div>

<script>
function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Đã copy link!");
}
</script>

</body>
</html>
